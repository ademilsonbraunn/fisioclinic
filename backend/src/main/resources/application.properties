# ── Banco de dados ────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5411/fisioclinic
spring.datasource.username=fisio
spring.datasource.password=fisio123
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Servidor ──────────────────────────────────────────────────────────────
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ── JWT ───────────────────────────────────────────────────────────────────
# ATENÇÃO: troque este valor antes de ir para produção
jwt.secret=troque-esta-chave-secreta-em-producao-use-256-bits
jwt.expiration=28800000

# ── CORS (origens permitidas) ─────────────────────────────────────────────
cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500

# ── Jackson ───────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.mapper.accept-case-insensitive-enums=true

# ── Logs ──────────────────────────────────────────────────────────────────
logging.level.com.fisioclinic=DEBUG
logging.level.org.springframework.security=WARN
