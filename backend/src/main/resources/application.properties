# ── Banco de dados ────────────────────────────────────────────────────────
# Em produção: definir DB_URL, DB_USERNAME e DB_PASSWORD como variáveis de ambiente
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5411/fisioclinic}
spring.datasource.username=${DB_USERNAME:fisio}
spring.datasource.password=${DB_PASSWORD:fisio123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Servidor ──────────────────────────────────────────────────────────────
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ── JWT ───────────────────────────────────────────────────────────────────
# Em produção: definir JWT_SECRET como variável de ambiente (mínimo 256 bits)
jwt.secret=${JWT_SECRET:dev-secret-inseguro-apenas-para-desenvolvimento-local}
jwt.expiration=28800000

# ── CORS (origens permitidas) ─────────────────────────────────────────────
cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500

# ── Jackson ───────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.mapper.accept-case-insensitive-enums=true

# ── Logs ──────────────────────────────────────────────────────────────────
logging.level.com.fisioclinic=DEBUG
logging.level.org.springframework.security=WARN
